<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>기본 구조의 표 만들기</h1>
<hr>
<table border="2">
    <caption>1학기 성적</caption>
    <thead>
        <tr>
            <th>이름</th>
            <th>HTMl</th>
            <th>CSS</th>
        </tr>
    </thead>
    <tfoot>
        <tr>
            <th>합</th>
            <th>225</th>
            <th>230</th>
        </tr>
    </tfoot>
    <tbody>
        <tr>
            <td>황기태</td><td>80</td><td>70</td>
        </tr> <! td도 th로 바꾸면 진한글씨 가운데 정렬 적용됨>
        <tr>
            <td>이재문</td><td>95</td><td>99</td>
        </tr>
        <tr>
            <td>이병은</td><td>40</td><td>61</td>
        </tr>
    </tbody>
 </table>
</body>
</html>
<! 표를 만들 때
   셀을 지정할 때
   th를 쓰면 강조
   td를 쓰면 일반>
